name: Test

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cirruslabs/swiftlint-action@v1
        with:
          version: latest

  unit-tests:
    name: Unit tests (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: Xcode_16.2
            swift: "6.0"
          - xcode: Xcode_16.4
            swift: "6.1"
          - xcode: Xcode_26.3
            swift: "6.2"
    env:
      DEVELOPER_DIR: /Applications/${{ matrix.xcode }}.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test -Xswiftc -warnings-as-errors --explicit-target-dependency-import-check error

  platform-build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, tvos, watchos, visionos, macos]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -scheme RagnarNetworking \
            -destination "generic/platform=${{ matrix.platform }}" \
            build
